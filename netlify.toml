[build]
  # Git push (diseño, código): solo exporta los JSON y construye. Sin API calls.
  # Rebuild mensual (hook "Actualización mensual"): comprueba actividad Bluesky
  # y Mastodon antes de exportar. Twitter nunca se toca en build (coste API).
  command   = "python3 -m pip install -q -r dataset/requirements.txt && { [ \"$INCOMING_HOOK_TITLE\" = 'Actualización mensual' ] && python3 dataset/scripts/check_activity.py --bluesky --mastodon || true; } && python3 dataset/scripts/export.py && npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION   = "20"
  PYTHON_VERSION = "3.11"

[functions]
  directory = "netlify/functions"
